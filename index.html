<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Tracker</title>

  <style>
    body {
      background: #0d0d0d;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .buttons button {
      margin-right: 10px;
      padding: 8px 12px;
      border: none;
      background: #222;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .buttons button:hover {
      background: #444;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .badge {
      background: #007bff;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
    }

    a {
      color: #4da6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h1>🤖 AI Model Tracker</h1>

<div class="buttons">
  <button onclick="filterModels('All')">All</button>
  <button onclick="filterModels('Free')">Free</button>
  <button onclick="filterModels('Freemium')">Freemium</button>
</div>

<div id="models"></div>

<script>
const models = [
  {
    name: "ChatGPT",
    company: "OpenAI",
    pricing: "Freemium",
    desc: "Chat AI for study, coding, and more",
    link: "https://chat.openai.com"
  },
  {
    name: "Gemini",
    company: "Google",
    pricing: "Free",
    desc: "Google AI assistant",
    link: "https://gemini.google.com"
  },
  {
    name: "Claude",
    company: "Anthropic",
    pricing: "Freemium",
    desc: "AI for writing and reasoning",
    link: "https://claude.ai"
  }
];

function display(data) {
  const container = document.getElementById("models");
  container.innerHTML = "";

  data.forEach(m => {
    container.innerHTML += `
      <div class="card">
        <h2>${m.name}</h2>
        <p>${m.company}</p>
        <p>${m.desc}</p>
        <span class="badge">${m.pricing}</span>
        <br><br>
        <a href="${m.link}" target="_blank">Open Official Site →</a>
      </div>
    `;
  });
}

function filterModels(type) {
  if (type === "All") return display(models);
  display(models.filter(m => m.pricing === type));
}

display(models);
</script>

</body>
</html>
